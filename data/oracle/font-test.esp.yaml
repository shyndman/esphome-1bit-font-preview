display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.print(0, 0, id(roboto_32_1), "HG@1W");
      it.print(0, 32, id(bungee_32_1), "HG@1W");
