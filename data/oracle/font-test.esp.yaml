    key: "NnsJLrTlphoZQAciQxtkczYLK87uIAc7lM4M9zs4GDY="

ota:
  - platform: esphome
    password: "fonttest-ota-password"

wifi:
  ssid: "FakeNetwork"
  password: "fakepassword123"

i2c:
  sda: GPIO21
  scl: GPIO22

font:
  # Roboto 16
  - file: "gfonts://Roboto"
    id: roboto_16_1
    size: 16
    bpp: 1
    glyphs: ["H", "G", "@", "1", "W"]
  - file: "gfonts://Roboto"
    id: roboto_16_2
    size: 16
    bpp: 2
    glyphs: ["H", "G", "@", "1", "W"]
